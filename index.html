<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:linear-gradient(160deg,#eaf2fb,#f5f5f7);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#1d1d1f;letter-spacing:-.022em}

button{font-size:17px;font-weight:600;padding:13px;border:none;border-radius:13px;background:#0071e3;color:#fff;cursor:pointer;transition:filter .2s}
button:active{filter:brightness(.92)}
.err{color:#ff3b30;font-size:14px;min-height:18px;margin-top:4px}
.hint{color:#aeaeb2;font-size:12px;margin-top:16px;line-height:1.5}

async function decrypt(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
